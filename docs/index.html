<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XIAO Project Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 30px; }
        header h1 { font-size: 2.5rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        header p { font-size: 1.1rem; opacity: 0.9; }
        .lang-switch { position: absolute; top: 20px; right: 20px; }
        .lang-btn {
            padding: 8px 16px; border: 2px solid white; background: transparent;
            color: white; border-radius: 20px; cursor: pointer; font-size: 0.9rem;
        }
        .lang-btn:hover { background: white; color: #667eea; }
        .filters {
            background: white; border-radius: 12px; padding: 20px;
            margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .filter-group { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 12px; }
        .filter-group:last-child { margin-bottom: 0; }
        .filter-group label { font-weight: 600; color: #333; min-width: 70px; }
        .filter-btn {
            padding: 8px 16px; border: 2px solid #667eea; background: white;
            border-radius: 20px; cursor: pointer; font-size: 0.9rem;
        }
        .filter-btn:hover { background: #f0f0ff; }
        .filter-btn.active { background: #667eea; color: white; }
        .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .project-card {
            background: white; border-radius: 12px; padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: transform 0.2s, box-shadow 0.2s;
        }
        .project-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
        .project-card h3 { color: #333; margin-bottom: 10px; font-size: 1.2rem; }
        .project-card p { color: #666; font-size: 0.95rem; line-height: 1.5; margin-bottom: 15px; }
        .project-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .tag { padding: 4px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: 500; }
        .tag-board { background: #e3f2fd; color: #1565c0; }
        .tag-category { background: #f3e5f5; color: #7b1fa2; }
        .tag-year { background: #fff3e0; color: #e65100; }
        .tag-author { background: #e8f5e9; color: #2e7d32; }
        .tag-official { background: #fce4ec; color: #c2185b; }
        .tag-community { background: #e0f2f1; color: #00695c; }
        .project-link {
            display: inline-block; padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; text-decoration: none; border-radius: 8px;
            font-weight: 500; transition: opacity 0.2s;
        }
        .project-link:hover { opacity: 0.9; }
        .stats { text-align: center; color: white; margin-bottom: 20px; font-size: 1rem; }
        .no-results { text-align: center; color: white; padding: 40px; font-size: 1.2rem; }
        .footer { text-align: center; color: white; opacity: 0.7; margin-top: 40px; font-size: 0.9rem; }
        .footer a { color: white; }
    </style>
</head>
<body>
    <div class="lang-switch">
        <button class="lang-btn" id="langBtn" onclick="toggleLang()">中文</button>
    </div>
    <div class="container">
        <header>
            <h1 id="title">🚀 XIAO Project Hub</h1>
            <p id="subtitle">Discover what you can build with XIAO</p>
        </header>
        <div class="filters">
            <div class="filter-group" id="year-filters">
                <label id="label-year">Year:</label>
                <button class="filter-btn active" data-filter="year" data-value="" id="btn-all-year">All</button>
            </div>
            <div class="filter-group" id="type-filters">
                <label id="label-type">Source:</label>
                <button class="filter-btn active" data-filter="author_type" data-value="" id="btn-all-type">All</button>
            </div>
            <div class="filter-group" id="board-filters">
                <label id="label-board">Board:</label>
                <button class="filter-btn active" data-filter="board" data-value="" id="btn-all-board">All</button>
            </div>
            <div class="filter-group" id="category-filters">
                <label id="label-category">Category:</label>
                <button class="filter-btn active" data-filter="category" data-value="" id="btn-all-cat">All</button>
            </div>
        </div>
        <div class="stats" id="stats"></div>
        <div class="projects-grid" id="projects"></div>
        <div class="no-results" id="no-results" style="display: none;">No matching projects found 😢</div>
        <div class="footer">
            <p id="footer-text">Data source: <a href="https://github.com/Seeed-Studio/OSHW-XIAO-Series/blob/main/projects.yaml" target="_blank">projects.yaml</a> | Contributions welcome!</p>
        </div>
    </div>
    <script>

                btnAll: "All", btnOfficial: "Official", btnCommunity: "Community",
                stats: n => `${n} projects`, noResults: "No matching projects found 😢", viewProject: "View Project →",
                footer: 'Data source: <a href="https://github.com/Seeed-Studio/OSHW-XIAO-Series/blob/main/projects.yaml" target="_blank">projects.yaml</a> | Contributions welcome!',

                footer: '数据来源：<a href="https://github.com/Seeed-Studio/OSHW-XIAO-Series/blob/main/projects.yaml" target="_blank">projects.yaml</a> | 欢迎贡献项目！',

        const PROJECTS_DATA = [

            {name:{en:"DIY Mini FPV Tank",zh:"DIY 迷你 FPV 坦克"},description:{en:"A smartphone-controlled mini FPV tank with 3D-printed chassis and real-time video streaming",zh:"手机控制的迷你 FPV 坦克，采用 3D 打印底盘，结合实时视频流和机器人技术"},board:"XIAO ESP32-S3 Sense",category:{en:"Robotics",zh:"机器人"},year:2025,author:{en:"The Wrench",zh:"The Wrench"},author_type:"Community",link:"https://www.youtube.com/watch?v=0dbdZrH8toE"},

            {name:{en:"Flock You",zh:"Flock You 摄像头检测器"},description:{en:"Firmware for XIAO ESP32-S3 that detects nearby surveillance cameras via Wi-Fi and BLE scanning",zh:"XIAO ESP32-S3 固件，通过 Wi-Fi 和 BLE 扫描检测附近的监控摄像头"},board:"XIAO ESP32-S3",category:{en:"Tools & Accessories",zh:"工具配件"},year:2025,author:{en:"colonelpanichacks",zh:"colonelpanichacks"},author_type:"Community",link:"https://github.com/colonelpanichacks/flock-you"},
            {name:{en:"AntiHunter Perimeter Defense System",zh:"AntiHunter 周界防御系统"},description:{en:"An open-source mesh-based perimeter defense system with Wi-Fi/BLE scanning and intrusion alerts",zh:"开源网状周界防御系统，支持 Wi-Fi/BLE 扫描、GPS 定位和入侵警报"},board:"XIAO ESP32-S3",category:{en:"Smart Home",zh:"智能家居"},year:2025,author:{en:"lukeswitz",zh:"lukeswitz"},author_type:"Community",link:"https://github.com/lukeswitz/AntiHunter"},
            {name:{en:"ESPHome ePaper Dashboard",zh:"ESPHome 电子墨水屏仪表板"},description:{en:"A low-power Home Assistant dashboard on XIAO 7.5'' ePaper panel showing weather and system metrics",zh:"基于 XIAO 7.5 英寸电子墨水屏的低功耗 Home Assistant 仪表板"},board:"XIAO ESP32",category:{en:"Smart Home",zh:"智能家居"},year:2025,author:{en:"r-morato",zh:"r-morato"},author_type:"Community",link:"https://github.com/r-morato/HASS-epaper-display"},
            {name:{en:"ZMK Dongle Screen YADS",zh:"ZMK 键盘接收器屏幕"},description:{en:"A wireless keyboard dongle display built with XIAO nRF52840 and ZMK firmware",zh:"基于 XIAO nRF52840 和 ZMK 固件的无线键盘接收器显示屏"},board:"XIAO nRF52840",category:{en:"Mechanical Keyboard",zh:"机械键盘"},year:2025,author:{en:"janpfischer",zh:"janpfischer"},author_type:"Community",link:"https://github.com/janpfischer/zmk-dongle-screen"},
            {name:{en:"Seeed Home Assistant Discovery",zh:"Seeed Home Assistant 自动发现"},description:{en:"A lightweight solution simplifying XIAO ESP32/nRF52840 connection to Home Assistant",zh:"简化 XIAO ESP32/nRF52840 连接 Home Assistant 的轻量级方案"},board:"XIAO ESP32",category:{en:"Smart Home",zh:"智能家居"},year:2025,author:{en:"Mengdu Li",zh:"Mengdu Li"},author_type:"Community",link:"https://github.com/limengdu/Seeed-Homeassistant-Discovery"},
            {name:{en:"LumiTrap Solar UV Bug Trap",zh:"LumiTrap 太阳能紫外线诱虫器"},description:{en:"A 3D-printed, solar-powered UV insect trap powered by XIAO SAMD21 for eco-friendly pest control",zh:"3D 打印的太阳能紫外线诱虫器，由 XIAO SAMD21 驱动"},board:"XIAO SAMD21",category:{en:"Smart Home",zh:"智能家居"},year:2025,author:{en:"Gokul",zh:"Gokul"},author_type:"Community",link:"https://www.instructables.com/LumiTrap-3D-Printed-Solar-UV-Bug-Trap-for-Eco-Frie/"},
            {name:{en:"Spine-like Robot Arm",zh:"仿脊椎机械臂"},description:{en:"3D-printed spine-inspired segments with servo-driven joints and modular gripper",zh:"3D 打印仿脊椎分段结构，配备舵机驱动关节和模块化夹爪"},board:"XIAO nRF52840 Sense",category:{en:"Robotics",zh:"机器人"},year:2025,author:{en:"Markus Opitz",zh:"Markus Opitz"},author_type:"Community",link:"https://www.instructables.com/Spine-like-Robot-Arm-With-Gripper/"},
            {name:{en:"Gus 2.0",zh:"Gus 2.0 情绪机器人"},description:{en:"A desktop robot powered by XIAO ESP32-C3 with sensors monitoring room health through emotions",zh:"由 XIAO ESP32-C3 驱动的桌面机器人，通过表情显示房间健康状况"},board:"XIAO ESP32-C3",category:{en:"Robotics",zh:"机器人"},year:2025,author:{en:"Arpan Mondal",zh:"Arpan Mondal"},author_type:"Community",link:"https://www.instructables.com/Gus-20-Uses-Emotions-to-Indicate-Room-Health/"},
            {name:{en:"BYTE 90",zh:"BYTE 90 复古玩具"},description:{en:"A retro-inspired, interactive designer toy built with XIAO ESP32-S3",zh:"受复古启发的交互式设计师玩具，基于 XIAO ESP32-S3"},board:"XIAO ESP32-S3",category:{en:"AI Gadget",zh:"AI Gadget"},year:2025,author:{en:"Alex Vong",zh:"Alex Vong"},author_type:"Community",link:"https://labs.alxvtoronto.com/collections/byte-90"},
            {name:{en:"ESP-DIVE",zh:"ESP-DIVE 潜水器"},description:{en:"A DIY submarine to explore underwater in first-person view using XIAO ESP32-S3 Sense",zh:"基于 XIAO ESP32-S3 Sense 的 DIY 潜水器，可通过第一人称视角探索水下世界"},board:"XIAO ESP32-S3 Sense",category:{en:"Robotics",zh:"机器人"},year:2025,author:{en:"Max Imagination",zh:"Max Imagination"},author_type:"Community",link:"https://www.instructables.com/ESP-DIVE-Build-an-ESP32-RC-Submarine-With-FPV-Came/"},
            {name:{en:"Hybrid Clock",zh:"混合时钟"},description:{en:"A wall-mounted clock featuring colorful 3D-printed dial with synchronized analog and digital displays",zh:"壁挂式时钟，采用彩色 3D 打印表盘，同步模拟和数字显示"},board:"XIAO ESP32-C6",category:{en:"Tools & Accessories",zh:"工具配件"},year:2025,author:{en:"shiura",zh:"shiura"},author_type:"Community",link:"https://www.instructables.com/Hybrid-Clock-Mechanical-Fusion-of-Digital-and-Anal/"},
            {name:{en:"Prototype Modular Smart Glasses",zh:"模块化智能眼镜原型"},description:{en:"A DIY open-tech platform transforming regular glasses into customizable smart eyewear",zh:"DIY 开放技术平台，将普通眼镜转变为可定制的智能眼镜"},board:"XIAO ESP32-S3 Sense",category:{en:"Wearables",zh:"可穿戴"},year:2025,author:{en:"Paul Stefaan Mooij",zh:"Paul Stefaan Mooij"},author_type:"Community",link:"https://www.hackster.io/psmooij/pmsg-prototype-modular-smart-glasses-8bd4e6"},
            {name:{en:"ESP32-C3 BLE Indoor Positioning",zh:"ESP32-C3 BLE 室内定位"},description:{en:"Indoor positioning using XIAO ESP32-C3 and ESPresense for smart home scene tracking",zh:"使用 XIAO ESP32-C3 和 ESPresense 实现 BLE 室内定位"},board:"XIAO ESP32-C3",category:{en:"Smart Home",zh:"智能家居"},year:2025,author:{en:"Official",zh:"官方"},author_type:"Official",link:"https://github.com/Seeed-Studio/OSHW-XIAO-Series/tree/main/projects/reference-projects/XIAO_ESP32-C3_BLE_ESPresense"},
            {name:{en:"ESP32 CSI Human Detection",zh:"ESP32 CSI 人体检测"},description:{en:"Non-contact human detection using WiFi CSI signals for security and health monitoring",zh:"利用 WiFi CSI 信号进行非接触式人体检测"},board:"XIAO ESP32",category:{en:"Healthcare",zh:"健康护理"},year:2025,author:{en:"Official",zh:"官方"},author_type:"Official",link:"https://github.com/Seeed-Studio/OSHW-XIAO-Series/tree/main/projects/reference-projects/XIAO_ESP32_CSI_Espectre"}
        ];
        let currentLang = 'en';
        let activeFilters = { year: '', author_type: '', board: '', category: '' };
        function toggleLang() { currentLang = currentLang === 'en' ? 'zh' : 'en'; updateLang(); renderProjects(); initFilters(); }
        function updateLang() {
            const L = LANG[currentLang];
            document.getElementById('title').textContent = L.title;
            document.getElementById('subtitle').textContent = L.subtitle;
            document.getElementById('label-year').textContent = L.labelYear;
            document.getElementById('label-type').textContent = L.labelType;
            document.getElementById('label-board').textContent = L.labelBoard;
            document.getElementById('label-category').textContent = L.labelCategory;
            document.getElementById('btn-all-year').textContent = L.btnAll;
            document.getElementById('btn-all-type').textContent = L.btnAll;
            document.getElementById('btn-all-board').textContent = L.btnAll;
            document.getElementById('btn-all-cat').textContent = L.btnAll;
            document.getElementById('no-results').textContent = L.noResults;
            document.getElementById('footer-text').innerHTML = L.footer;
            document.getElementById('langBtn').textContent = L.langBtn;
        }
        function t(obj) { return typeof obj === 'string' ? obj : (obj[currentLang] || obj.en); }
        function initFilters() {
            const years = [...new Set(PROJECTS_DATA.map(p => p.year))].sort((a, b) => b - a);
            const boards = [...new Set(PROJECTS_DATA.map(p => p.board))].sort();
            const categories = [...new Set(PROJECTS_DATA.map(p => t(p.category)))].sort();
            const types = ['Official', 'Community'];
            document.querySelectorAll('.filter-btn:not([id])').forEach(btn => btn.remove());
            const L = LANG[currentLang];
            // Year buttons
            years.forEach(year => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn'; btn.dataset.filter = 'year'; btn.dataset.value = year;
                btn.textContent = year; document.getElementById('year-filters').appendChild(btn);
            });
            // Type buttons
            const typeContainer = document.getElementById('type-filters');
            types.forEach(type => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn'; btn.dataset.filter = 'author_type'; btn.dataset.value = type;
                btn.textContent = type === 'Official' ? L.btnOfficial : L.btnCommunity;
                typeContainer.appendChild(btn);
            });
            // Board buttons
            boards.forEach(board => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn'; btn.dataset.filter = 'board'; btn.dataset.value = board;
                btn.textContent = board; document.getElementById('board-filters').appendChild(btn);
            });
            // Category buttons
            categories.forEach(category => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn'; btn.dataset.filter = 'category'; btn.dataset.value = category;
                btn.textContent = category; document.getElementById('category-filters').appendChild(btn);
            });
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const filterType = btn.dataset.filter;
                    document.querySelectorAll(`.filter-btn[data-filter="${filterType}"]`).forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    activeFilters[filterType] = btn.dataset.value;
                    renderProjects();
                });
            });
        }
        function renderProjects() {
            const container = document.getElementById('projects');
            const noResults = document.getElementById('no-results');
            const stats = document.getElementById('stats');
            const L = LANG[currentLang];
            let filtered = PROJECTS_DATA.filter(p => {
                if (activeFilters.year && p.year != activeFilters.year) return false;
                if (activeFilters.author_type && p.author_type !== activeFilters.author_type) return false;
                if (activeFilters.board && p.board !== activeFilters.board) return false;
                if (activeFilters.category && t(p.category) !== activeFilters.category) return false;
                return true;
            });
            stats.textContent = L.stats(filtered.length);
            if (filtered.length === 0) { container.innerHTML = ''; noResults.style.display = 'block'; return; }
            noResults.style.display = 'none';
            container.innerHTML = filtered.map(p => `
                <div class="project-card">
                    <h3>${t(p.name)}</h3>
                    <p>${t(p.description)}</p>
                    <div class="project-meta">
                        <span class="tag tag-year">${p.year}</span>
                        <span class="tag tag-board">${p.board}</span>
                        <span class="tag tag-category">${t(p.category)}</span>
                        <span class="tag ${p.author_type === 'Official' ? 'tag-official' : 'tag-community'}">${t(p.author)}</span>
                    </div>
                    <a href="${p.link}" target="_blank" class="project-link">${L.viewProject}</a>
                </div>
            `).join('');
        }
        updateLang(); initFilters(); renderProjects();
    </script>
</body>
</html>
